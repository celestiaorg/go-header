name: go-header CI
on:
  push:
    tags:
      - v*
    branches:
      - main
  pull_request:
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-go@v3
        with:
          go-version: 1.20

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v3.4.0
        with:
          version: v1.49.0

  go_mod_tidy_check:
    name: Go Mod Tidy Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-go@v3
        with:
          go-version: 1.20

      - run: go mod tidy

      - name: check for diff
        run: git diff --exit-code

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Build
        run: go build -v ./...

      - name: Test & Coverage
        run: go test -cover -coverprofile coverage.o ./... -- -v --race
      - uses: codecov/codecov-action@v3
        with:
          file: ./coverage.o

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest
      - name: Go Mod Tidy
        run: go mod tidy && git diff --exit-code